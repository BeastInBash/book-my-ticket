<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-slate-800 p-8 rounded-2xl w-full max-w-md shadow-xl">
        <h2 class="text-2xl font-bold text-white mb-6 text-center">Register</h2>

        <form id="registerForm" class="space-y-4">

            <input type="text" placeholder="Name" id="name" required
                class="w-full p-3 rounded bg-slate-700 text-white" />
            <input type="email" placeholder="Email" id="email" required
                class="w-full p-3 rounded bg-slate-700 text-white" />
            <input type="password" placeholder="Password" id="password" required
                class="w-full p-3 rounded bg-slate-700 text-white" />

            <input type="text" placeholder="Phone" id="phone" class="w-full p-3 rounded bg-slate-700 text-white" />
            <input type="text" placeholder="Address" id="address" class="w-full p-3 rounded bg-slate-700 text-white" />
            <input type="text" placeholder="City" id="city" required
                class="w-full p-3 rounded bg-slate-700 text-white" />
            <input type="text" placeholder="State" id="state" required
                class="w-full p-3 rounded bg-slate-700 text-white" />

            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white p-3 rounded font-bold">
                Register
            </button>
        </form>

        <p class="text-slate-400 text-center mt-4">
            Already have an account?
            <a href="/login" class="text-emerald-400">Login</a>
        </p>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const payload = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                phone: document.getElementById("phone").value,
                address: document.getElementById("address").value,
                city: document.getElementById("city").value,
                state: document.getElementById("state").value
            };

            const res = await fetch("/api/v1/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (data.success) {
                alert("Registered successfully!");
                window.location.href = "/login";
            } else {
                alert(data.message || "Registration failed");
            }
        });
    </script>

</body>

</html>
