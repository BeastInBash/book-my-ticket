<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

        body {
            font-family: "Outfit", sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>

<body
    class="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="w-full flex justify-between items-center mb-6">
        <h2 class="text-xl font-semibold text-slate-300">🎬 Seat Booking</h2>

        <button onclick="openBookingsModal()"
            class="bg-cyan-500 hover:bg-cyan-400 text-white px-5 py-2 rounded-xl font-medium shadow-lg transition-all">
            My Bookings
        </button>
    </div>
    <div
        class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50">
        <div class="text-center mb-10">
            <h1
                class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight">
                ChaiCode Cinema - Now Showing<br />
                <br />
                <span class="text-red-400">
                    <span class="font-bold">Dhurandhar The Revenge</span>
                </span>
            </h1>
            <p class="text-slate-400 text-lg">Jassi ko ghar ki yaad kyu nhi aai?</p>
        </div>

        <div class="flex justify-center mb-10">
            <div class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"></div>
                    <span class="text-slate-300 font-medium tracking-wide">Available</span>
                </div>
                <div class="w-px h-6 bg-slate-700"></div>
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"></div>
                    <span class="text-slate-400 font-medium tracking-wide">Booked</span>
                </div>
            </div>
        </div>

        <div class="flex justify-center">
            <div class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner">
                <table id="tbl" class="border-separate border-spacing-4 mx-auto"></table>
            </div>
        </div>
    </div>
    <div id="bookingModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-slate-800 w-full max-w-md rounded-2xl p-6 border border-slate-700 shadow-2xl">

            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-white">My Bookings</h3>
                <button onclick="closeBookingsModal()" class="text-slate-400 hover:text-white">✖</button>
            </div>

            <div id="bookingList" class="space-y-3 max-h-80 overflow-y-auto">
                <!-- bookings will render here -->
            </div>

        </div>
    </div>
    <script>
        async function openBookingsModal() {
            const modal = document.getElementById("bookingModal");
            const list = document.getElementById("bookingList");

            modal.classList.remove("hidden");
            modal.classList.add("flex");

            try {
                const res = await fetch("/api/v1/booking/my-booking", {
                    method: "GET",
                    credentials: "include"
                });

                const data = await res.json();

                list.innerHTML = "";

                if (!data.data || data.data.length === 0) {
                    list.innerHTML = `<p class="text-slate-400">No bookings yet</p>`;
                    return;
                }

                data.data.forEach(seat => {
                    const div = document.createElement("div");
                    div.className = "bg-slate-900 p-3 rounded-xl border border-slate-700";

                    div.innerHTML = `
                <p class="text-white font-semibold">Seat #${seat.id}</p>
                <p class="text-slate-400 text-sm">Booked as: ${seat.name}</p>
            `;

                    list.appendChild(div);
                });

            } catch (err) {
                console.error(err);
                list.innerHTML = `<p class="text-red-400">Failed to load bookings</p>`;
            }
        }

        function closeBookingsModal() {
            const modal = document.getElementById("bookingModal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }
        async function run() {
            const tbl = document.getElementById("tbl");
            const res = await fetch("/seats", {
                method: "GET",
                credentials: "include"
            });
            const resarray = await res.json();
            const j = resarray.sort((a, b) => a.id - b.id);
            let tr;
            for (let i = 0; i < j.length; i++) {
                if (i % 8 === 0) tr = document.createElement("tr");

                const td = document.createElement("td");

                // Base aesthetic classes - added 'relative group' for tooltip positioning
                const baseClasses =
                    "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

                if (j[i].isbooked) {
                    td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
                    td.innerHTML = `
                    <span class="relative z-10">${j[i].id}</span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                        Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                    </div>
                `;
                } else {
                    td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.5)] active:scale-95 active:shadow-[0_0_10px_rgba(16,185,129,0.3)]`;
                    td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;
                }

                td.addEventListener("click", async function (e) {
                    const currentTd = e.currentTarget;
                    if (currentTd.classList.contains("cursor-not-allowed")) {
                        return; // Seat is already taken
                    }

                    try {
                        const id = j[i].id; // Safe from loop closure
                        const name = prompt("Enter your name");
                        if (!name) return;

                        const res = await fetch(`/${id}/${name}`, {method: "PUT"});
                        const data = await res.json();

                        if (data.error) {
                            alert("FAILED! Couldn't book! already booked.");
                        } else {
                            alert("Booked successfully!");
                            // Visually transition to booked state upon success
                            currentTd.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
                            currentTd.innerHTML = `
                            <span class="relative z-10">${id}</span>
                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                                Booked by: <span class="font-bold text-white ml-1">${name}</span>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                            </div>
                        `;
                        }
                    } catch (ex) {
                        alert("error booking " + ex);
                    }
                });
                tr.appendChild(td);
                tbl.appendChild(tr);
            }
        }
        run();
    </script>
</body>

</html>
